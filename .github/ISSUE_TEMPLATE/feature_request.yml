name: ✨ Feature Request
description: Propose a God-Tier performance tweak or Master Engine capability.
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Void OS Feature Request
        Propose architectural changes, new registry hooks, or scheduling optimizations.
        *If your feature relates to aesthetics, please note that Void OS prioritizes performance over visual fluff.*
  - type: textarea
    attributes:
      label: The Proposal
      description: Explain the feature and how it interacts with the OS.
    validations:
      required: true
  - type: textarea
    attributes:
      label: The "Why"
      description: Why does Void OS need this? Detail the DPC latency reduction, FPS gain, or process isolation benefit.
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Stability Guarantee
      options:
        - label: "This tweak does NOT brick essential hardware (Wi-Fi, Bluetooth, Audio)."
          required: true
  - type: textarea
    attributes:
      label: Benchmark Evidence (Optional)
      description: Provide links to CapFrameX or LatencyMon metrics proving the efficacy of this tweak.
