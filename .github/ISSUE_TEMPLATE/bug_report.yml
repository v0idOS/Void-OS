name: 🐛 Bug Report
description: Report a driver issue, stutter, or Master Engine failure.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Void OS Bug Report
        Welcome to the Void. Before reporting, please ensure you are not submitting an issue caused by third-party tweakers.
  - type: checkboxes
    attributes:
      label: Pre-flight Checklist
      description: We will close issues that ignore these rules.
      options:
        - label: "I am running Void OS on a clean Windows 11 installation."
          required: true
        - label: "I have checked the [Known Issues](https://github.com/v0idOS/Void-OS/blob/main/docs/known_issues.md) documentation."
          required: true
        - label: "I have not used other debloat tools (e.g. O&O ShutUp10, Chris Titus Tool) alongside Void OS."
          required: true
  - type: textarea
    attributes:
      label: Description of the Anomaly
      description: A clear, brutal description of what broke.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction Steps
      description: Exact steps to trigger the bug.
    validations:
      required: true
  - type: input
    attributes:
      label: Windows Build Version
      placeholder: e.g. 24H2 (OS Build 26100.2033)
    validations:
      required: true
  - type: textarea
    attributes:
      label: Hardware Telemetry
      description: CPU, RAM, GPU, and Motherboard. Specify if Laptop or Desktop.
    validations:
      required: true
