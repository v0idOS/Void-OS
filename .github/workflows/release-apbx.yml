name: Release APBX

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-apbx-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-apbx:
    runs-on: windows-latest

    steps:
      - name: Checkout Void OS repo
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Install 7-Zip
        shell: pwsh
        run: choco install 7zip -y

      - name: Build APBX with local-build.ps1
        id: build_apbx
        shell: pwsh
        working-directory: src
        run: |
          $fileName = "VoidOS-$env:GITHUB_REF_NAME"
          .\void-tools\local-build.ps1 -ReplaceOldPlaybook -DontOpenPbLocation -Removals Verification,WinverRequirement -FileName $fileName

          $apbxPath = Join-Path $PWD "void-core\$fileName.apbx"
          if (!(Test-Path $apbxPath)) {
            throw "APBX not found at expected path: $apbxPath"
          }

          Copy-Item $apbxPath "$env:GITHUB_WORKSPACE\$fileName.apbx" -Force
          "apbx_name=$fileName.apbx" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload APBX to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build_apbx.outputs.apbx_name }}
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
