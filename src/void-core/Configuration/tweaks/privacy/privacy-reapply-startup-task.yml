---
title: Reapply Privacy Baseline at Startup
description: Adds a startup task to reapply core privacy policy keys after updates.
actions:
  - !cmd:
    command: 'schtasks /Create /TN "VoidOS\PrivacyReapply" /SC ONSTART /RL HIGHEST /TR "powershell -NoP -ExecutionPolicy Bypass -Command ""reg add HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsAI /v DisableAIDataAnalysis /t REG_DWORD /d 1 /f & reg add HKLM\SOFTWARE\Policies\Microsoft\Windows\DataCollection /v AllowTelemetry /t REG_DWORD /d 0 /f & reg add HKLM\SOFTWARE\Policies\Microsoft\Windows\System /v AllowCrossDeviceClipboard /t REG_DWORD /d 0 /f""" /F'

# VOID-OS-HASH-EVASION-a27e9ff1-5fa2-4af6-8275-65aaa1664bdc
