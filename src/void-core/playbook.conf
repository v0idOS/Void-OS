<Playbook>
	<Name>Void OS</Name>
	<Username>Void</Username>
	<Title>Void OS v1.0.0</Title>
	<ShortDescription>Void OS — Hardware-aware Windows 11 execution engine</ShortDescription>
	<Description><![CDATA[╭───────────── ⚠️ 𝗖𝗿𝗶𝘁𝗶𝗰𝗮𝗹 ⚠️ ─────────────╮
│         Read the Void documentation first.       │
│                https://github.com/v0idOS/Void-OS/tree/main/docs                 │
╰───────────────────────────────────────╯

Void OS makes your computer snappier and more private with lots of usability improvements.]]></Description>
	<Details>An open and lightweight modification to Windows, designed to optimize performance, privacy and security.</Details>
	<ProgressText><![CDATA[Void OS is installing software, copying its configuration folders, and tweaking Windows. If you are not already, we recommend following our documentation.]]></ProgressText>
	<Version>1.0.0</Version>
	<SupportedBuilds>
		<!-- 24H2 -->
		<string>26100</string>
		<!-- 25H2 -->
		<string>26200</string>
	</SupportedBuilds>
	<Requirements>
		<Requirement>DefenderToggled</Requirement>
		<Requirement>NoAntivirus</Requirement>
		<Requirement>Internet</Requirement>
		<Requirement>NoPendingUpdates</Requirement>
		<Requirement>UCPDDisabled</Requirement>
		<Requirement>PluggedIn</Requirement>
	</Requirements>
	<UniqueId>ae75dbd1-0e1f-496f-9a84-1655364557c4</UniqueId>
	<InstallGuide>https://github.com/v0idOS/Void-OS/tree/main/docs</InstallGuide>
	<Overhaul>true</Overhaul>
	<UseKernelDriver>false</UseKernelDriver>
	<AllowUnsupportedUpgrades>false</AllowUnsupportedUpgrades>
	<EstimatedMinutes>15</EstimatedMinutes>
	<Git>https://github.com/v0idOS/Void-OS</Git>
	<Website>https://github.com/v0idOS/Void-OS</Website>
	<DonateLink>https://ko-fi.com/voidos</DonateLink>
	<SupportsISO>true</SupportsISO>
	<OOBE>
		<BulletPoints>
			<BulletPoint Icon="Rocket" Title="Performance"
			Description="By removing unnecessary background processes, telemetry, optionally disabling power-saving features and more."/>
			<BulletPoint Icon="Lock" Title="Usability"
			Description="By removing Windows' advertising, and fixing general annoyances, you will have a more enjoyable Windows experience."/>
			<BulletPoint Icon="Privacy" Title="Privacy"
			Description="By eliminating most of Microsoft's notorious tracking, pre-installed apps, and bloatware, Void OS makes Windows private."/>
		</BulletPoints>
		<Internet>Force</Internet>
	</OOBE>
	<ISO>
		<DisableBitLocker>true</DisableBitLocker>
		<DisableHardwareRequirements>true</DisableHardwareRequirements>
	</ISO>
	<FeaturePages>
		<CheckboxPage IsRequired="false" Description="Select optional features to retain.">
			<Options>
				<CheckboxOption>
					<Text>Enable V-Sync (Gaming)</Text>
					<Name>enable-vsync</Name>
				</CheckboxOption>
			</Options>
			<BottomLine Text="Learn more" Link="https://github.com/v0idOS/Void-OS/tree/main/docs"/>
		</CheckboxPage>
	</FeaturePages>
</Playbook>
